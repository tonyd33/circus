ringmaster:
  enabled: true
  image:
    repository: circus-ringmaster
  env:
    chimpImage: circus-chimp:latest
    reconcileInterval: "15000"  # Faster reconciliation for dev

usher:
  enabled: true
  image:
    repository: circus-usher

bullhorn:
  enabled: true
  image:
    repository: circus-bullhorn

chimp:
  initConfig:
    enabled: true
    commands:
      - command: clone-repo
        args:
          url: "https://github.com/tonyd33/circus.git"
      - command: set-working-dir
        args:
          path: "circus"
