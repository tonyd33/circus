ringmaster:
  enabled: true
  image:
    repository: ringmaster

usher:
  enabled: true
  image:
    repository: usher

bullhorn:
  enabled: false
  image:
    repository: bullhorn

dashboard:
  enabled: true
  image:
    repository: dashboard

chimp:
  profiles:
    default:
      brain: opencode
      model: big-pickle
      image: "chimp:latest"
  extraEnv:
    - name: ANTHROPIC_API_KEY
      valueFrom:
        secretKeyRef:
          name: anthropic-api-key
          key: ANTHROPIC_API_KEY
  initConfig:
    enabled: true
    commands:
      - command: clone-repo
        args:
          url: "https://github.com/tonyd33/circus.git"
      - command: set-working-dir
        args:
          path: "circus"
