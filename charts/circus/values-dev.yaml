ringmaster:
  enabled: true
  image:
    repository: ringmaster

usher:
  enabled: true
  image:
    repository: usher
  routes:
    - adapter: debug
      path: /api/webhooks/debug
    - adapter: github
      path: /api/webhooks/github
  extraEnv:
    - name: GITHUB_BOT_NAME
      value: tonyd33
    - name: GITHUB_PROFILE
      value: default
    - name: GITHUB_APP_ID
      value: '3434984'
    - name: GITHUB_WEBHOOK_SECRET
      valueFrom:
        secretKeyRef:
          name: circus-secrets
          key: GITHUB_WEBHOOK_SECRET
    - name: GITHUB_PRIVATE_KEY
      valueFrom:
        secretKeyRef:
          name: circus-secrets
          key: GITHUB_PRIVATE_KEY

bullhorn:
  enabled: true
  image:
    repository: bullhorn

dashboard:
  enabled: true
  image:
    repository: dashboard
