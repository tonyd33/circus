# Default values for circus.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Global settings
global:
  namespace: default

# External services configuration
# These services are expected to be installed separately
externalServices:
  redis:
    url: "redis://redis:6379"
  nats:
    url: "nats://nats:4222"
  minio:
    url: "http://minio:9000"

# Ringmaster configuration
ringmaster:
  enabled: true
  image:
    repository: circus-ringmaster
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  serviceAccount:
    create: true
    name: ringmaster
  rbac:
    create: true
  env:
    chimpImage: "circus-chimp:latest"
    reconcileInterval: "30000"
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  # Anthropic API key - should be provided via secret
  anthropicApiKey:
    existingSecret: "anthropic-api-key"
    key: "ANTHROPIC_API_KEY"

# Usher configuration
usher:
  enabled: true
  image:
    repository: circus-usher
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 3000
  env:
    chimpImage: "circus-chimp:latest"
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  # Anthropic API key - should be provided via secret
  anthropicApiKey:
    existingSecret: "anthropic-api-key"
    key: "ANTHROPIC_API_KEY"

# Bullhorn configuration
bullhorn:
  enabled: true
  image:
    repository: circus-bullhorn
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"
