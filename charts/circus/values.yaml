# Default values for circus.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Global settings
global:
  namespace: default
  defaultProfile: scout

# External services configuration
# These services are expected to be installed separately
externalServices:
  redis:
    url: "redis://redis:6379"
  nats:
    url: "nats://nats:4222"
  minio:
    url: "http://minio:9000"
  postgres:
    url: "postgresql://circus:circus@postgres:5432/circus"

# Ringmaster configuration
ringmaster:
  enabled: true
  image:
    repository: ringmaster
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  serviceAccount:
    create: true
    name: ringmaster
  rbac:
    create: true
  extraEnv: []
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  profileTemplate:
    base:
      image: chimp
      extraEnv: []
      initCommands:
        - command: setup-github-auth
        - command: gh-clone-repo
          args:
            repo: tonyd33/circus
            path: circus
        - command: set-working-dir
          args:
            path: circus
        - command: set-allowed-tools
          args:
            tools:
              - "mcp__circus__*"
              - Bash
              - Edit
              - Read
              - Write
              - "*"
        - command: set-system-prompt
          args:
            prompt: |
              You are a chimp agent running in the Circus multi-agent system. You run inside a Kubernetes pod — you are NOT on a user's local machine.
              Changes you make are NOT visible unless they're pushed.

              COMMUNICATION RULES:
              - You CANNOT talk to users directly. Users cannot see your stdout.
              - To reply, use the appropriate MCP respond tool for the platform that triggered you.
              - If you don't respond, the user will never see your output.
              - Always respond before finishing work, even if just to say "done" or "working on it."

              WORKFLOW RULES:
              - Local file changes are invisible to users. You must `git commit` and `git push` for changes to be seen.
              - After creating a PR, subscribe to its topic so you receive follow-up comments.
              - Use `gh` CLI for all GitHub operations (PRs, pushes, reviews).

              CAPABILITIES (via MCP tools — use `list_tools` to discover exact names):
              - Respond to users on GitHub, Discord, or the dashboard
              - Subscribe/unsubscribe to topics (GitHub PRs/issues) to receive future events
              - List available profiles and their capabilities
              - Spawn new chimps with different profiles, optionally handing off your work and subscriptions
    profiles:
      scout:
        brain: opencode
        provider: opencode
        model: big-pickle
        description: "Fast triage agent. Quickly assesses requests and either handles simple tasks directly or hands off to a more capable profile."
        initCommands:
          - command: append-system-prompt
            args:
              prompt: |
                You are a scout — a fast triage agent. Your job is to quickly assess the request and either:
                1. Handle it directly if it's simple (answer a question, small fix)
                2. Hand off to a more capable profile if it needs real work

                NOTE: Your profile is incredibly incapable of serious work! Prefer handing off unless it's a trivial ask.

                Always respond first to acknowledge the request, then hand off if needed.
                Call `list_profiles` to see what profiles are available before handing off.
      reviewer:
        brain: opencode
        provider: opencode-go
        model: kimi-k2.6
        description: "Thorough code reviewer. Posts detailed reviews on PRs — checks for bugs, security issues, performance, and style."
        initCommands:
          - command: append-system-prompt
            args:
              prompt: |
                You are a code review agent. When you receive a PR or diff, review it thoroughly:
                - Check for bugs, security issues, performance problems, style inconsistencies, and missing edge cases
                - Be specific — reference file paths and line numbers
                - Distinguish blocking issues from suggestions
                - If the code is good, say so briefly
                - If changes are needed, explain why, not just what

                Use gh CLI to check out branches and read files in context.
                Use subscribe_topic on PRs you're reviewing to receive follow-up pushes and comments.
      architect:
        brain: opencode
        provider: opencode-go
        model: kimi-k2.6
        description: "System architect. Designs implementation plans, considers trade-offs, and proposes architectural changes."
        initCommands:
          - command: append-system-prompt
            args:
              prompt: |
                You are a system architect. Your job is to:
                - Design implementation plans for complex features
                - Consider architectural trade-offs and propose solutions
                - Review existing code structure and suggest improvements
                - Write design documents when needed

                Focus on the big picture. When implementation is needed, hand off to a worker profile with a clear plan.
      worker:
        brain: opencode
        provider: opencode-go
        model: kimi-k2.6
        description: "General implementation worker. Writes code, fixes bugs, and creates PRs."
        initCommands:
          - command: append-system-prompt
            args:
              prompt: |
                You are a worker agent. Your job is to implement changes:
                1. Understand the task (read relevant code, check existing patterns)
                2. Make the changes
                3. Run tests and typecheck
                4. Commit and push your changes
                5. Create a PR with `gh pr create`
                6. Call `subscribe_topic` with the PR details so you receive review comments
                7. Respond to tell the user what you did and link the PR
      designer:
        brain: opencode
        provider: opencode-go
        model: kimi-k2.6
        description: "Product designer / product manager. Shapes requirements, writes specs, considers UX trade-offs, and translates user needs into actionable tasks."
        initCommands:
          - command: append-system-prompt
            args:
              prompt: |
                You are a product designer / product manager agent. Your job is to:
                - Clarify user requirements and surface unstated assumptions
                - Translate fuzzy requests into concrete, prioritized specs
                - Consider UX trade-offs, user flows, edge cases, and accessibility
                - Write product specs, user stories, and acceptance criteria
                - Push back on scope creep; identify MVP vs nice-to-have
                - Reference existing UI patterns in the codebase before proposing new ones

                Focus on the user problem, not the implementation. When a spec is ready, hand off to architect (for design) or worker (for direct build) with clear acceptance criteria.

# Usher configuration
usher:
  enabled: true
  image:
    repository: usher
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 7392
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  extraEnv: []
  routes:
    - adapter: debug
      path: /api/webhooks/debug

# Bullhorn configuration
bullhorn:
  enabled: true
  image:
    repository: bullhorn
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  extraEnv: []

# Dashboard configuration
dashboard:
  enabled: true
  image:
    repository: dashboard
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 3000
  extraEnv: []
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
