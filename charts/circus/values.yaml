# Default values for circus.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Global settings
global:
  namespace: default

# NATS configuration (DEVELOPMENT)
nats:
  enabled: false
  image:
    repository: nats
    tag: "2.10-alpine"
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 4222
  storage:
    enabled: true
    size: 1Gi
  args:
    - "-js"
    - "-sd"
    - "/data"

# Redis configuration (DEVELOPMENT)
redis:
  enabled: false
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 6379
  args:
    - redis-server
    - --appendonly
    - "yes"
  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
  readinessProbe:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 5

# MinIO configuration (DEVELOPMENT)
minio:
  enabled: false
  image:
    repository: minio/minio
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    apiPort: 9000
    consolePort: 9001
  auth:
    rootUser: minioadmin
    rootPassword: minioadmin
  livenessProbe:
    enabled: true
    path: /minio/health/live
    initialDelaySeconds: 30
    periodSeconds: 10
  readinessProbe:
    enabled: true
    path: /minio/health/ready
    initialDelaySeconds: 30
    periodSeconds: 10
  args:
    - server
    - /data
    - --console-address
    - ":9001"

# Ringmaster configuration
ringmaster:
  enabled: true
  image:
    repository: circus-ringmaster
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  serviceAccount:
    create: true
    name: ringmaster
  rbac:
    create: true
  env:
    # Redis and NATS URLs will use the generated service names
    # Format: redis://<release-name>-circus-redis:6379
    # You can override these if using external services
    redisUrl: ""  # Auto-generated if empty
    natsUrl: ""   # Auto-generated if empty
    chimpImage: "circus-chimp:latest"
    reconcileInterval: "30000"
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  # Anthropic API key - should be provided via secret
  anthropicApiKey:
    existingSecret: "anthropic-api-key"
    key: "api-key"

# Usher configuration
usher:
  enabled: true
  image:
    repository: circus-usher
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 3000
  env:
    # Redis and NATS URLs will use the generated service names
    # Format: redis://<release-name>-circus-redis:6379
    # You can override these if using external services
    redisUrl: ""  # Auto-generated if empty
    natsUrl: ""   # Auto-generated if empty
    chimpImage: "circus-chimp:latest"
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  # Anthropic API key - should be provided via secret
  anthropicApiKey:
    existingSecret: "anthropic-api-key"
    key: "api-key"

# Secret configuration
secrets:
  anthropicApiKey:
    # Set this to your Anthropic API key
    # You can also create the secret manually before installing the chart
    create: false
    # If create is true, provide the API key value here
    # WARNING: This is not secure for production - use external secret management
    value: ""
