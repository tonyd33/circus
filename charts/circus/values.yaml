# Default values for circus.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Global settings
global:
  namespace: default

# External services configuration
# These services are expected to be installed separately
externalServices:
  redis:
    url: "redis://redis:6379"
  nats:
    url: "nats://nats:4222"
  minio:
    url: "http://minio:9000"

# Ringmaster configuration
ringmaster:
  enabled: true
  image:
    repository: ringmaster
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  serviceAccount:
    create: true
    name: ringmaster
  rbac:
    create: true
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Usher configuration
usher:
  enabled: true
  image:
    repository: usher
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 7392
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  routes:
    - adapter: debug
      path: /debug

# Bullhorn configuration
bullhorn:
  enabled: true
  image:
    repository: bullhorn
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

# Dashboard configuration
dashboard:
  enabled: true
  image:
    repository: dashboard
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
