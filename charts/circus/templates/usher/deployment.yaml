{{- if .Values.usher.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "circus.fullname" . }}-usher
  labels:
    {{- include "circus.labels" . | nindent 4 }}
    app.kubernetes.io/component: usher
spec:
  replicas: {{ .Values.usher.replicaCount }}
  selector:
    matchLabels:
      {{- include "circus.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: usher
  template:
    metadata:
      labels:
        {{- include "circus.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: usher
    spec:
      containers:
        - name: usher
          image: "{{ .Values.usher.image.repository }}:{{ .Values.usher.image.tag }}"
          imagePullPolicy: {{ .Values.usher.image.pullPolicy }}
          env:
            - name: REDIS_URL
              value: {{ .Values.externalServices.redis.url | quote }}
            - name: NATS_URL
              value: {{ .Values.externalServices.nats.url | quote }}
            - name: PORT
              value: {{ .Values.usher.service.port | quote }}
            {{- with .Values.usher.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - containerPort: 7392
              protocol: TCP
          args:
            {{- range .Values.usher.routes }}
            - "--route"
            - "adapter={{ .adapter }},path={{ .path }}"
            {{- end }}
          resources:
            {{- toYaml .Values.usher.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: 7392
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 7392
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: 7392
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
{{- end }}
