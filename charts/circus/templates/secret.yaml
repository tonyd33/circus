{{- if .Values.secrets.anthropicApiKey.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: anthropic-api-key
  labels:
    {{- include "circus.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secrets.anthropicApiKey.value }}
  api-key: {{ .Values.secrets.anthropicApiKey.value | b64enc | quote }}
  {{- else }}
  # No API key provided - you must create this secret manually or provide a value
  api-key: ""
  {{- end }}
{{- end }}
