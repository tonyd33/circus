{{- if .Values.dashboard.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "circus.fullname" . }}-dashboard
  labels:
    {{- include "circus.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  replicas: {{ .Values.dashboard.replicaCount }}
  selector:
    matchLabels:
      {{- include "circus.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        {{- include "circus.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: dashboard
    spec:
      containers:
        - name: dashboard
          image: "{{ .Values.dashboard.image.repository }}:{{ .Values.dashboard.image.tag }}"
          imagePullPolicy: {{ .Values.dashboard.image.pullPolicy }}
          env:
            - name: LEDGER_URL
              value: "http://{{ include "circus.fullname" . }}-ledger:{{ .Values.ledger.service.port }}"
            - name: NATS_URL
              value: {{ .Values.externalServices.nats.url | quote }}
            - name: NODE_ENV
              value: "production"
          ports:
            - containerPort: 3000
              protocol: TCP
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
{{- end }}
