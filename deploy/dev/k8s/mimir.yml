---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mimir-config
  namespace: default
data:
  mimir.yaml: |
    multitenancy_enabled: false

    server:
      http_listen_port: 9009
      grpc_listen_port: 9095
      log_level: info

    distributor:
      ring:
        kvstore:
          store: inmemory

    ingester:
      ring:
        kvstore:
          store: inmemory
        replication_factor: 1

    blocks_storage:
      backend: filesystem
      filesystem:
        dir: /data/mimir-blocks
      bucket_store:
        sync_dir: /data/mimir-sync
      tsdb:
        dir: /data/mimir-tsdb

    compactor:
      data_dir: /data/mimir-compactor

    store_gateway:
      sharding_ring:
        replication_factor: 1
        kvstore:
          store: inmemory

    ruler_storage:
      backend: filesystem
      filesystem:
        dir: /data/mimir-rules

    limits:
      native_histograms_ingestion_enabled: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mimir
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mimir
  template:
    metadata:
      labels:
        app: mimir
    spec:
      containers:
      - name: mimir
        image: grafana/mimir:2.11.0
        args:
        - -config.file=/etc/mimir/mimir.yaml
        - -target=all
        ports:
        - containerPort: 9009
          name: http
        - containerPort: 9095
          name: grpc
        volumeMounts:
        - name: config
          mountPath: /etc/mimir
        - name: storage
          mountPath: /data
        livenessProbe:
          httpGet:
            path: /ready
            port: 9009
          initialDelaySeconds: 45
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 9009
          initialDelaySeconds: 45
          periodSeconds: 10
      volumes:
      - name: config
        configMap:
          name: mimir-config
      - name: storage
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mimir
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: mimir
  ports:
  - name: http
    port: 9009
    targetPort: 9009
  - name: grpc
    port: 9095
    targetPort: 9095
