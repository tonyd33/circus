---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ringmaster
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ringmaster
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ringmaster
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ringmaster
subjects:
  - kind: ServiceAccount
    name: ringmaster
    namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ringmaster
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ringmaster
  template:
    metadata:
      labels:
        app: ringmaster
    spec:
      serviceAccountName: ringmaster
      containers:
      - name: ringmaster
        image: circus-ringmaster
        imagePullPolicy: IfNotPresent
        env:
        - name: REDIS_URL
          value: "redis://redis:6379"
        - name: NATS_URL
          value: "nats://nats:4222"
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: CHIMP_IMAGE
          value: "circus-chimp:latest"
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: anthropic-api-key
              key: api-key
        - name: RECONCILE_INTERVAL
          value: "30000"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
