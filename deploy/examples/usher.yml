---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: usher
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: usher
  template:
    metadata:
      labels:
        app: usher
    spec:
      containers:
      - name: usher
        image: circus-usher
        imagePullPolicy: IfNotPresent
        env:
        - name: REDIS_URL
          value: "redis://redis:6379"
        - name: NATS_URL
          value: "nats://nats:4222"
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: CHIMP_IMAGE
          value: "circus-chimp:latest"
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: anthropic-api-key
              key: api-key
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: usher
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: usher
  ports:
  - name: usher
    port: 3000
    targetPort: 3000
