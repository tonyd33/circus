apiVersion: v1
kind: ConfigMap
metadata:
  name: mimir-config
data:
  mimir.yaml: |
    multitenancy_enabled: false

    server:
      http_listen_port: 9009
      grpc_listen_port: 9095
      log_level: info

    distributor:
      ring:
        kvstore:
          store: inmemory

    ingester:
      ring:
        kvstore:
          store: inmemory
        replication_factor: 1

    blocks_storage:
      backend: filesystem
      filesystem:
        dir: /data/mimir-blocks
      bucket_store:
        sync_dir: /data/mimir-sync
      tsdb:
        dir: /data/mimir-tsdb

    compactor:
      data_dir: /data/mimir-compactor

    store_gateway:
      sharding_ring:
        replication_factor: 1
        kvstore:
          store: inmemory

    ruler_storage:
      backend: filesystem
      filesystem:
        dir: /data/mimir-rules

    limits:
      native_histograms_ingestion_enabled: true
