name: Build and Push Docker Images

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push all images
        run: |
          TARGETS=(chimp ringmaster usher bullhorn ledger dashboard)
          PUSH="${{ github.event_name != 'pull_request' }}"

          for target in "${TARGETS[@]}"; do
            IMAGE="${REGISTRY}/${IMAGE_NAME}/${target}"
            TAGS=""

            if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
              VERSION="${GITHUB_REF#refs/tags/v}"
              MAJOR="${VERSION%%.*}"
              MINOR="${VERSION%.*}"
              TAGS="-t ${IMAGE}:${VERSION} -t ${IMAGE}:${MINOR} -t ${IMAGE}:${MAJOR} -t ${IMAGE}:latest"
            elif [[ "$GITHUB_REF" == refs/pull/* ]]; then
              PR_NUM="${GITHUB_REF#refs/pull/}"
              PR_NUM="${PR_NUM%/merge}"
              TAGS="-t ${IMAGE}:pr-${PR_NUM}"
            else
              BRANCH="${GITHUB_REF#refs/heads/}"
              TAGS="-t ${IMAGE}:${BRANCH}"
              if [[ "$BRANCH" == "master" || "$BRANCH" == "main" ]]; then
                TAGS="${TAGS} -t ${IMAGE}:latest"
              fi
            fi

            OUTPUT="type=image"
            if [[ "$PUSH" == "true" ]]; then
              OUTPUT="${OUTPUT},push=true"
            fi

            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --target "$target" \
              ${TAGS} \
              --output "${OUTPUT}" \
              --cache-from type=gha,scope="${target}" \
              --cache-to type=gha,mode=max,scope="${target}" \
              .
          done
